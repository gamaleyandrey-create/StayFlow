version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: stayflow-postgres
    restart: always
    environment:
      POSTGRES_USER: stayflow
      POSTGRES_PASSWORD: stayflow
      POSTGRES_DB: stayflow
    ports:
      - "5432:5432"
    volumes:
      - stayflow_postgres:/var/lib/postgresql/data

volumes:
  stayflow_postgres:
