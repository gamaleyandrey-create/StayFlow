version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: stayflow
      POSTGRES_PASSWORD: stayflow
      POSTGRES_DB: stayflow
